<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Breaker Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        #gameCanvas {
            border: 3px solid white;
            background: #1a1a1a;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin: 20px;
        }
        
        .stats {
            display: flex;
            gap: 40px;
            font-size: 1.3em;
        }
        
        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
        }
        
        #gameOverModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        #gameOverModal.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid white;
            text-align: center;
        }
        
        #gameOverTitle {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        #finalScore {
            font-size: 3em;
            color: #FFD93D;
            font-weight: bold;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🎮 Block Breaker Game</h1>
    
    <div class="stats">
        <div class="stat">Score: <span id="score">0</span></div>
        <div class="stat">Lives: <span id="lives">3</span></div>
    </div>
    
    <canvas id="gameCanvas" width="480" height="320"></canvas>
    
    <div id="gameOverModal">
        <div class="modal-content">
            <h2 id="gameOverTitle">Game Over!</h2>
            <p>Final Score:</p>
            <div id="finalScore">0</div>
            <p>Press <strong>SPACE</strong> to Play Again</p>
        </div>
    </div>
    
    <script src="IchiroShmain.js"></script>
</body>
</html>
